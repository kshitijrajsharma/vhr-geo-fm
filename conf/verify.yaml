defaults:
  - config
  - _self_

hydra:
  sweeper:
    params:
      model.backbone: >-
        timm_resnet50,
        timm_convnext_xlarge,
        terratorch_dofa_large_patch16_224,
        timm_clay_v1_base,
        terratorch_satlas_swin_b_naip_si_rgb,
        terratorch_satlas_swin_b_sentinel2_si_ms,
        terratorch_ssl4eos12_resnet50_sentinel2_all_decur,
        terratorch_terramind_v1_large,
        terratorch_prithvi_eo_v2_600_tl

# Quick verification: 1% data, 1 epoch, 1 trial, 1 seed
data:
  datasets: [spacenet2, spacenet7, flair2, dynamic_earthnet, treesatai]
  data_pct: 1

training:
  mode: frozen
  max_epochs: 1
  early_stop_patience: 1

performance:
  num_workers: 4

hpo:
  n_trials: 1
  lr_min: 1e-4
  lr_max: 1e-4
  batch_sizes: [4]

eval:
  seeds: [42]
  n_bootstrap: 10

output:
  dir: ./results/verify/${model.backbone}
